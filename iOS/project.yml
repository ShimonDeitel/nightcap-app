name: Nightcap
options:
  bundleIdPrefix: com.shimondeitel.cocktaillog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Nightcap:
    type: application
    platform: iOS
    sources:
      - path: Nightcap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cocktaillog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Nightcap/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NightcapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NightcapTests
      - path: Nightcap.storekit
    dependencies:
      - target: Nightcap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cocktaillog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NightcapUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NightcapUITests
    dependencies:
      - target: Nightcap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cocktaillog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Nightcap:
    build:
      targets:
        Nightcap: all
        NightcapTests: [test]
        NightcapUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Nightcap.storekit
    test:
      config: Debug
      storeKitConfiguration: Nightcap.storekit
      targets:
        - NightcapTests
        - NightcapUITests
    archive:
      config: Release
